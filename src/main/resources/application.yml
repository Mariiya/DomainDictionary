server:
  port: 8888

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:domaindictionary}
    username: ${POSTGRES_USER:dduser}
    password: ${POSTGRES_PASSWORD:ddpass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

elasticsearch:
  uri: ${ELASTICSEARCH_URI:http://localhost:9200}

app:
  jwt:
    secret: ${JWT_SECRET:default-secret-key-change-in-production-minimum-256-bits-long-key}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  claude:
    api-key: ${CLAUDE_API_KEY:}
    model: claude-sonnet-4-6
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
